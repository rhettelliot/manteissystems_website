          - generic [ref=e398]:
            - heading "THE GEO METRO DECISION." [level=3] [ref=e399]
            - paragraph [ref=e400]: "In 1998, Rhett Elliot Johnson faced a choice: repair a battered Geo Metro or buy an EMU ESI-32 Sampler. He chose the sampler. This radical decision — prioritizing the tools of agency over practical convenience — became the foundational DNA of Manteis Systems."
        - generic [ref=e401]:
          - generic [ref=e402]: THE HYPNOSIS OF CONTROL
          - generic [ref=e403]:
            - heading "DESIGNED FOR EXTRACTION." [level=3] [ref=e404]
            - paragraph [ref=e405]: Modern existence is being flattened by Big Tech, Big Corporate, and Big Pharma. We are being hypnotized by algorithmic dopamine loops designed not for our flourishing, but for our extraction. We have exchanged our agency for quarterly metrics. Convenience is the delivery mechanism. Dependency is the product.
        - generic [ref=e406]:
          - generic [ref=e407]: THE SUBVERSION
          - generic [ref=e408]:
            - heading "BREAK THE MACHINE." [level=3] [ref=e409]
            - paragraph [ref=e410]: Technology — when held by the individual — is the ultimate tool of subversion. Just as the printing press broke the monopoly of the scribe, and the early internet broke the monopoly of the broadcast, Autonomous AI is here to break the monopoly of the Corporate Machine. Every client we serve gets the same choice Rhett made in 1998. We make sure they choose right.
        - generic [ref=e411]:
          - generic [ref=e412]: THE ENTER(PRISE)-PRENEUR
          - generic [ref=e413]:
            - heading "A MULTIGENERATIONAL BUILD." [level=3] [ref=e414]
            - paragraph [ref=e415]: "Manteis Systems is not just a consultancy — it is a legacy. We are building a business that can be handed to our sons and brothers. Whether automating communications for a PNW contractor or defending a family through AI-assisted legal strategy, our mission is singular: use technology to pull people up."
        - generic [ref=e416]:
          - generic [ref=e417]: THE MOBILE ELITE RESPONSE
          - generic [ref=e418]:
            - heading "THE MANTEIS MOBILE UNIT." [level=3] [ref=e419]
            - paragraph [ref=e420]: Remote-first but present on the ground. Our vision is a mobile, 24/7 elite response laboratory driving across the Pacific Northwest — deploying on-site sovereignty for the most innovative teams and families. The Sovereign Node goes where you go.
