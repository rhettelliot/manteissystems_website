            - heading "THE 1998 DECISION." [level=3] [ref=e400]
            - paragraph [ref=e401]: "In 1998, Rhett Elliot Johnson faced a choice: repair a battered car or buy his first music sampler. He chose the sampler. This radical decision — prioritizing the tools of agency over practical convenience — became the foundational DNA of Manteis Systems."
        - generic [ref=e402]:
          - generic [ref=e403]: THE HYPNOSIS OF CONTROL
          - generic [ref=e404]:
            - heading "DESIGNED FOR EXTRACTION." [level=3] [ref=e405]
            - paragraph [ref=e406]: Modern existence is being flattened by Big Tech, Big Corporate, and Big Pharma. We are being hypnotized by algorithmic dopamine loops designed not for our flourishing, but for our extraction. We have exchanged our agency for quarterly metrics. Convenience is the delivery mechanism. Dependency is the product.
        - generic [ref=e407]:
          - generic [ref=e408]: THE SUBVERSION
          - generic [ref=e409]:
            - heading "BREAK THE MACHINE." [level=3] [ref=e410]
            - paragraph [ref=e411]: Technology — when held by the individual — is the ultimate tool of subversion. Just as the printing press broke the monopoly of the scribe, and the early internet broke the monopoly of the broadcast, Autonomous AI is here to break the monopoly of the Corporate Machine. Every client we serve gets the same choice Rhett made in 1998. We make sure they choose right.
        - generic [ref=e412]:
          - generic [ref=e413]: THE ENTER(PRISE)-PRENEUR
          - generic [ref=e414]:
            - heading "A MULTIGENERATIONAL BUILD." [level=3] [ref=e415]
            - paragraph [ref=e416]: "Manteis Systems is not just a consultancy — it is a legacy. We are building a business that can be handed to our sons and brothers. Whether automating communications for a PNW contractor or defending a family through AI-assisted legal strategy, our mission is singular: use technology to pull people up."
        - generic [ref=e417]:
          - generic [ref=e418]: THE MOBILE ELITE RESPONSE
          - generic [ref=e419]:
            - heading "THE MANTEIS MOBILE UNIT." [level=3] [ref=e420]
            - paragraph [ref=e421]: Remote-first but present on the ground. Our vision is a mobile, 24/7 elite response laboratory driving across the Pacific Northwest — deploying on-site sovereignty for the most innovative teams and families. The Sovereign Node goes where you go.
